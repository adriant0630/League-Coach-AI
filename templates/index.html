<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL-Tool: Build Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a1428 0%, #1a1f36 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.5em;
            color: #00d4ff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-section {
            background: rgba(26, 31, 54, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.95em;
        }

        input,
        select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }

        .chip-input {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 4px;
            min-height: 40px;
            align-items: center;
        }

        .chip {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chip button {
            background: none;
            border: none;
            color: #00d4ff;
            cursor: pointer;
            font-size: 1.2em;
            padding: 0;
            line-height: 1;
        }

        .chip-input input {
            border: none;
            background: none;
            flex: 1;
            min-width: 100px;
            padding: 0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-generate {
            background: linear-gradient(135deg, #00d4ff 0%, #00a8cc 100%);
            color: #000;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: rgba(200, 100, 100, 0.3);
            border: 1px solid rgba(200, 100, 100, 0.6);
            color: #e0a0a0;
        }

        .btn-clear:hover {
            background: rgba(200, 100, 100, 0.5);
        }

        .results-section {
            background: rgba(26, 31, 54, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .result-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            padding: 15px;
        }

        .result-card h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .result-card p,
        .result-card ul {
            font-size: 0.95em;
            line-height: 1.6;
            color: #c0c0c0;
        }

        .result-card ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        .result-card li {
            margin-bottom: 6px;
        }

        .error {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.4);
            color: #ff9999;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #00d4ff;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎮 LOL-Tool</h1>
            <p class="subtitle">AI-Powered League of Legends Build Recommender</p>
        </header>

        <div class="main-grid">
            <!-- Input Form -->
            <div class="form-section">
                <h2 style="color: #00d4ff; margin-bottom: 20px;">Build Configuration</h2>

                <div class="form-group">
                    <label for="champion">Champion *</label>
                    <select id="champion" required>
                        <option value="">Select a champion...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="role">Role *</label>
                    <select id="role" required>
                        <option value="">Select a role...</option>
                        <option value="top">Top</option>
                        <option value="jungle">Jungle</option>
                        <option value="mid">Mid</option>
                        <option value="adc">ADC</option>
                        <option value="support">Support</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="enemy-input">Enemy Comp * (add champions)</label>
                    <div class="chip-input">
                        <div id="enemy-chips"></div>
                        <input type="text" id="enemy-input" placeholder="Type and press Enter..." autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="team-input">Your Team Comp (optional)</label>
                    <div class="chip-input">
                        <div id="team-chips"></div>
                        <input type="text" id="team-input" placeholder="Type and press Enter..." autocomplete="off">
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-generate" id="btn-generate">Generate Build</button>
                    <button class="btn-clear" id="btn-clear">Clear</button>
                </div>

                <div id="error-message" class="error hidden"></div>
            </div>

            <!-- Results -->
            <div class="results-section">
                <h2 style="color: #00d4ff; margin-bottom: 20px;">Recommendations</h2>

                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px;">Analyzing wiki data with AI...</p>
                </div>

                <div id="results" class="hidden">
                    <div class="results-grid" id="results-grid"></div>
                </div>

                <div id="no-results" style="text-align: center; color: #666; padding: 40px 20px;">
                    Fill in the form and click "Generate Build" to get AI-powered recommendations
                </div>
            </div>
        </div>
    </div>

    <script>
        const championsSelect = document.getElementById('champion');
        const roleSelect = document.getElementById('role');
        const enemyInput = document.getElementById('enemy-input');
        const teamInput = document.getElementById('team-input');
        const enemyChips = document.getElementById('enemy-chips');
        const teamChips = document.getElementById('team-chips');
        const btnGenerate = document.getElementById('btn-generate');
        const btnClear = document.getElementById('btn-clear');
        const errorMessage = document.getElementById('error-message');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const noResults = document.getElementById('no-results');
        const resultsGrid = document.getElementById('results-grid');

        let enemyComp = [];
        let teamComp = [];

        // Load champions
        fetch('/api/champions')
            .then(res => res.json())
            .then(champs => {
                champs.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    championsSelect.appendChild(opt);
                });
            });

        // Chip input handlers
        const handleChipInput = (input, chipsDiv, chipsArray) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = input.value.trim();
                    if (val && !chipsArray.includes(val)) {
                        chipsArray.push(val);
                        updateChips(chipsDiv, chipsArray, input);
                    }
                    input.value = '';
                }
            });
        };

        const updateChips = (chipsDiv, chipsArray, input) => {
            chipsDiv.innerHTML = chipsArray.map(chip => `
                <div class="chip">
                    ${chip}
                    <button type="button" data-chip="${chip}">×</button>
                </div>
            `).join('');

            chipsDiv.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const chip = btn.dataset.chip;
                    chipsArray.splice(chipsArray.indexOf(chip), 1);
                    updateChips(chipsDiv, chipsArray, input);
                });
            });
        };

        handleChipInput(enemyInput, enemyChips, enemyComp);
        handleChipInput(teamInput, teamChips, teamComp);

        // Clear form
        btnClear.addEventListener('click', () => {
            championsSelect.value = '';
            roleSelect.value = '';
            enemyComp = [];
            teamComp = [];
            updateChips(enemyChips, enemyComp, enemyInput);
            updateChips(teamChips, teamComp, teamInput);
            errorMessage.classList.add('hidden');
            results.classList.add('hidden');
            noResults.classList.remove('hidden');
        });

        // Generate recommendations
        btnGenerate.addEventListener('click', async () => {
            errorMessage.classList.add('hidden');

            const champion = championsSelect.value;
            const role = roleSelect.value;

            if (!champion || !role || enemyComp.length === 0) {
                errorMessage.textContent = 'Please fill in: Champion, Role, and Enemy Comp';
                errorMessage.classList.remove('hidden');
                return;
            }

            btnGenerate.disabled = true;
            loading.classList.remove('hidden');
            results.classList.add('hidden');
            noResults.classList.add('hidden');

            try {
                const response = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        champion,
                        role,
                        enemy_comp: enemyComp,
                        team_comp: teamComp.length > 0 ? teamComp : null
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to generate recommendations');
                }

                displayResults(data.recommendation);
            } catch (error) {
                errorMessage.textContent = `Error: ${error.message}`;
                errorMessage.classList.remove('hidden');
            } finally {
                btnGenerate.disabled = false;
                loading.classList.add('hidden');
            }
        });

        const displayResults = (rec) => {
            const cards = [
                {
                    title: '🔮 Rune Page',
                    content: renderRunes(rec.rune_page)
                },
                {
                    title: '⚡ Summoner Spells',
                    content: renderSummoners(rec.summoner_spells)
                },
                {
                    title: '🎯 Early Game Plan',
                    content: `<p>${rec.early_game_plan}</p>`
                },
                {
                    title: '🛒 Item Path',
                    content: renderItems(rec.item_path)
                },
                {
                    title: '💪 Teamfight Role',
                    content: `<p>${rec.teamfight_role}</p>`
                }
            ];

            resultsGrid.innerHTML = cards.map(card => `
                <div class="result-card">
                    <h3>${card.title}</h3>
                    ${card.content}
                </div>
            `).join('');

            results.classList.remove('hidden');
            noResults.classList.add('hidden');
        };

        const renderRunes = (runes) => {
            const tree = runes.primary_tree || 'Unknown';
            const keystone = runes.primary_keystone || 'Unknown';
            const secondary = runes.secondary_tree || 'Unknown';
            return `
                <p><strong>Primary:</strong> ${tree}</p>
                <p><strong>Keystone:</strong> ${keystone}</p>
                <p><strong>Secondary:</strong> ${secondary}</p>
            `;
        };

        const renderSummoners = (summoners) => {
            const spell1 = summoners.spell_1 || 'Unknown';
            const spell2 = summoners.spell_2 || 'Unknown';
            const reasoning = summoners.reasoning || '';
            return `
                <p><strong>Spells:</strong> ${spell1} / ${spell2}</p>
                <p><em>${reasoning}</em></p>
            `;
        };

        const renderItems = (items) => {
            const early = items.early_game || 'Unknown';
            const mid = items.mid_game || 'Unknown';
            const late = items.late_game || 'Unknown';
            const reasoning = items.reasoning || '';
            return `
                <p><strong>Early:</strong> ${early}</p>
                <p><strong>Mid:</strong> ${mid}</p>
                <p><strong>Late:</strong> ${late}</p>
                <p><em>${reasoning}</em></p>
            `;
        };
    </script>
</body>

</html>
